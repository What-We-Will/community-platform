name: Production Deploy

on:
  workflow_dispatch:

env:
  HUSKY: 0

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24.x'
          cache: 'npm'

      - run: npm ci --ignore-scripts
      
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Install Vercel CLI
        run: npm install -g vercel@54.2.0

      - name: Pull Vercel env
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy to production
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash scripts/ci/vercel-deploy-with-retry.sh production_url --prebuilt --prod

      - name: Comment PR with URL
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        env:
          PRODUCTION_URL: ${{ steps.deploy.outputs.production_url }}
        with:
          script: |
            const url = process.env.PRODUCTION_URL || '';
            if (!url) {
              core.warning('production_url is empty — skipping PR comment');
              return;
            }
            if (!/^https:\/\/[a-z0-9.-]+\.vercel\.app\b/.test(url)) {
              core.setFailed(`Unexpected production URL: ${url}`);
              return;
            }
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 1,
            });
            const merged = prs.find(pr => pr.merge_commit_sha === context.sha);
            if (merged) {
              await github.rest.issues.createComment({
                issue_number: merged.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ Production deployed: ${url}`,
              });
            }