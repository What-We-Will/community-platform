name: Dependabot PR triage

# Automates reading the decision matrix in
# docs/runbooks/validating-dependency-updates.md: classifies each Dependabot
# PR as safe-to-merge or needs-review, then writes the verdict to an artifact.
# Does NOT post anything itself — GitHub caps Dependabot-triggered pull_request
# runs to a read-only GITHUB_TOKEN regardless of the declared `permissions:`
# block (confirmed empirically: a write here 403s even with issues: write
# declared). dependabot-triage-post.yml, triggered by workflow_run, reads this
# artifact and does the actual comment/label write with a normal token — see
# that file for why workflow_run escapes the restriction.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Dependabot re-pushes (e.g. rebasing after a base-branch update) fire
# `synchronize` in quick succession; without this, overlapping runs can race
# on the same result artifact.
concurrency:
  group: dependabot-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  triage:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # TEMPORARY DIAGNOSTIC — replaces the secret-availability canary, whose
      # question is answered: Actions secrets are EMPTY on Dependabot runs,
      # Dependabot secrets are readable.
      #
      # This isolates the one remaining unknown before any real wiring —
      # actions/create-github-app-token#235 reports minting failing with
      # "Integration not found" on Dependabot-triggered runs specifically. If
      # that bites here, the GitHub App approach is dead and the fallback is a
      # PAT. continue-on-error keeps the failure diagnosable instead of
      # collapsing the job before the report step runs.
      - name: Mint App token
        id: apptoken
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Reports presence only — no secret or token value is ever echoed. The
      # API probe is a read, so a green result proves authentication without
      # touching the PR.
      - name: Report minting result
        env:
          ID: ${{ secrets.APP_ID }}
          KEY: ${{ secrets.APP_PRIVATE_KEY }}
          TOKEN: ${{ steps.apptoken.outputs.token }}
          OUTCOME: ${{ steps.apptoken.outcome }}
          GH_TOKEN: ${{ steps.apptoken.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$ID" ];  then echo "APP_ID secret:      PRESENT"; else echo "APP_ID secret:      EMPTY"; fi
          if [ -n "$KEY" ]; then echo "APP_PRIVATE_KEY:    PRESENT"; else echo "APP_PRIVATE_KEY:    EMPTY"; fi
          echo "mint step outcome:  $OUTCOME"
          if [ -n "$TOKEN" ]; then echo "minted token:       PRESENT"; else echo "minted token:       EMPTY"; fi

          if [ -z "$TOKEN" ]; then
            echo "api probe:          SKIPPED (no token)"
            exit 0
          fi
          if gh api "repos/$REPO" --jq .full_name >/dev/null 2>&1; then
            echo "api probe:          OK (token authenticates)"
          else
            echo "api probe:          FAILED (token minted but rejected)"
          fi

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Classify
        id: classify
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: scripts/ci/classify-dependabot-pr.sh

      - name: Write triage result artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.classify.outputs.verdict }}
          REASON: ${{ steps.classify.outputs.reason }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
        run: |
          jq -n \
            --argjson prNumber "$PR_NUMBER" \
            --arg verdict "$VERDICT" \
            --arg reason "$REASON" \
            --arg dependencyNames "$DEPENDENCY_NAMES" \
            --arg updateType "$UPDATE_TYPE" \
            --arg dependencyType "$DEPENDENCY_TYPE" \
            '{prNumber: $prNumber, verdict: $verdict, reason: $reason, dependencyNames: $dependencyNames, updateType: $updateType, dependencyType: $dependencyType}' \
            > triage-result.json

      - name: Upload triage result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependabot-triage-result
          path: triage-result.json
          retention-days: 1
