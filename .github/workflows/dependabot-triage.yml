name: Dependabot PR triage

# Automates reading the decision matrix in
# docs/runbooks/validating-dependency-updates.md: classifies each Dependabot
# PR as safe-to-merge or needs-review, then writes the verdict to an artifact.
# Does NOT post anything itself — GitHub caps Dependabot-triggered pull_request
# runs to a read-only GITHUB_TOKEN regardless of the declared `permissions:`
# block (confirmed empirically: a write here 403s even with issues: write
# declared). dependabot-triage-post.yml, triggered by workflow_run, reads this
# artifact and does the actual comment/label write with a normal token — see
# that file for why workflow_run escapes the restriction.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Dependabot re-pushes (e.g. rebasing after a base-branch update) fire
# `synchronize` in quick succession; without this, overlapping runs can race
# on the same result artifact.
concurrency:
  group: dependabot-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  triage:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # TEMPORARY DIAGNOSTIC — remove once the result is recorded.
      # Establishes which secret store a Dependabot-triggered run can actually
      # read, which decides where a GitHub App's credentials have to live. Tests
      # emptiness only and never echoes a value. Delete this step and both
      # CANARY_* secrets once the answer is known.
      - name: Secret availability canary
        env:
          A: ${{ secrets.CANARY_ACTIONS }}
          D: ${{ secrets.CANARY_DEPENDABOT }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          if [ -n "$A" ]; then echo "ACTIONS secret:    PRESENT"; else echo "ACTIONS secret:    EMPTY"; fi
          if [ -n "$D" ]; then echo "DEPENDABOT secret: PRESENT"; else echo "DEPENDABOT secret: EMPTY"; fi
          echo "actor:             $ACTOR"
          echo "triggering_actor:  $TRIGGERING_ACTOR"
          echo "event:             $GITHUB_EVENT_NAME"

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Classify
        id: classify
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: scripts/ci/classify-dependabot-pr.sh

      - name: Write triage result artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.classify.outputs.verdict }}
          REASON: ${{ steps.classify.outputs.reason }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
        run: |
          jq -n \
            --argjson prNumber "$PR_NUMBER" \
            --arg verdict "$VERDICT" \
            --arg reason "$REASON" \
            --arg dependencyNames "$DEPENDENCY_NAMES" \
            --arg updateType "$UPDATE_TYPE" \
            --arg dependencyType "$DEPENDENCY_TYPE" \
            '{prNumber: $prNumber, verdict: $verdict, reason: $reason, dependencyNames: $dependencyNames, updateType: $updateType, dependencyType: $dependencyType}' \
            > triage-result.json

      - name: Upload triage result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependabot-triage-result
          path: triage-result.json
          retention-days: 1
