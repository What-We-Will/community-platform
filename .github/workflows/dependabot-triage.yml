name: Dependabot PR triage

# Automates reading the decision matrix in
# docs/runbooks/validating-dependency-updates.md: classifies each Dependabot
# PR as safe-to-merge or needs-review and posts the verdict as a comment +
# label. Does NOT merge anything — auto-merge is a deliberate later step.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          alert-lookup: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Classify
        id: classify
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          ALERT_STATE: ${{ steps.metadata.outputs.alert-state }}
          GHSA_ID: ${{ steps.metadata.outputs.ghsa-id }}
        run: scripts/ci/classify-dependabot-pr.sh

      # ready to merge / status: needs-review already exist as labels used by
      # the project's manual triage workflow — reused here rather than adding
      # a parallel bot-only label scheme.
      - name: Post verdict comment and label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          VERDICT: ${{ steps.classify.outputs.verdict }}
          REASON: ${{ steps.classify.outputs.reason }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
        with:
          script: |
            const marker = '<!-- dependabot-triage:verdict -->';
            const verdict = process.env.VERDICT;
            const reason = process.env.REASON;
            const isSafe = verdict === 'safe';

            const runbookUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/docs/runbooks/validating-dependency-updates.md`;

            const body = [
              '### 🤖 Dependency update triage',
              '',
              `**Verdict:** ${isSafe ? '✅ Safe to merge' : '⚠️ Needs review'}`,
              `**Package(s):** \`${process.env.DEPENDENCY_NAMES}\``,
              `**Bump:** ${process.env.UPDATE_TYPE} (${process.env.DEPENDENCY_TYPE})`,
              `**Why:** ${reason}`,
              '',
              `_Per the [decision matrix](${runbookUrl})._`,
              '',
              marker,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            const addLabel = isSafe ? 'ready to merge' : 'status: needs-review';
            const removeLabel = isSafe ? 'status: needs-review' : 'ready to merge';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [addLabel],
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: removeLabel,
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }
