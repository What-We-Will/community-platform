name: Dependabot PR triage

# Decision matrix lives in docs/runbooks/validating-dependency-updates.md.
#
# Writes go through a GitHub App token rather than GITHUB_TOKEN: GitHub treats
# Dependabot-triggered runs as fork runs, where `permissions:` can only adjust
# read scopes and any write 403s regardless of what is declared. The App's
# credentials must sit in the Dependabot secret store — Actions secrets resolve
# to empty on these runs.
#
# pull_request_target would also lift the ceiling. ADR-0003 prohibits it.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Dependabot re-pushes (e.g. rebasing after a base-branch update) fire
# `synchronize` in quick succession; without this, overlapping runs can race on
# the same comment.
concurrency:
  group: dependabot-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  triage:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Capped here as well as at the App installation, so broadening the App for
      # an unrelated reason can't silently widen this workflow. Requesting a
      # permission the installation lacks fails the mint, which is intended.
      - name: Mint App token
        id: apptoken
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Classify
        id: classify
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: scripts/ci/classify-dependabot-pr.sh

      # Posting failures warn rather than fail the job: this validates nothing
      # about the update, so a transient API hiccup shouldn't red-X the PR. Same
      # reasoning as the Slack notify steps in preview.yml.
      #
      # Labels are the ones the manual triage workflow already uses, not a
      # parallel bot-only scheme.
      - name: Post verdict comment and label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          VERDICT: ${{ steps.classify.outputs.verdict }}
          REASON: ${{ steps.classify.outputs.reason }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
        with:
          github-token: ${{ steps.apptoken.outputs.token }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- dependabot-triage:verdict -->';
            const isSafe = process.env.VERDICT === 'safe';

            const runbookUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/docs/runbooks/validating-dependency-updates.md`;

            const body = [
              '### 🤖 Dependency update triage',
              '',
              `**Verdict:** ${isSafe ? '✅ Safe to merge' : '⚠️ Needs review'}`,
              `**Package(s):** \`${process.env.DEPENDENCY_NAMES}\``,
              `**Bump:** ${process.env.UPDATE_TYPE} (${process.env.DEPENDENCY_TYPE})`,
              `**Why:** ${process.env.REASON}`,
              '',
              `_Per the [decision matrix](${runbookUrl})._`,
              '',
              marker,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const existing = comments.find((c) => c.body && c.body.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (err) {
              core.warning(`Could not post triage comment on PR #${prNumber}: ${err.message}`);
            }

            const addLabel = isSafe ? 'ready to merge' : 'status: needs-review';
            const removeLabel = isSafe ? 'status: needs-review' : 'ready to merge';

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [addLabel],
              });
            } catch (err) {
              core.warning(`Could not add label "${addLabel}" on PR #${prNumber}: ${err.message}`);
            }

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: removeLabel,
              });
            } catch (err) {
              if (err.status !== 404) {
                core.warning(`Could not remove label "${removeLabel}" on PR #${prNumber}: ${err.message}`);
              }
            }
