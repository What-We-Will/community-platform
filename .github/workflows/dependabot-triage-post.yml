name: Dependabot PR triage (post)

# Second stage of dependabot-triage.yml, split out because Dependabot-triggered
# pull_request runs get a read-only GITHUB_TOKEN no matter what `permissions:`
# is declared (confirmed empirically — see dependabot-triage.yml). workflow_run
# is the GitHub-documented escape hatch: a workflow it triggers gets a normal
# token, and — just as important — it always runs the workflow file from the
# default branch, never from the triggering PR, so this never executes
# PR-authored code with an elevated token.
#
# Posting failures (rate limit, transient API hiccup, a renamed label) are
# logged as warnings, not job failures — this job doesn't validate anything
# about the dependency update, so its failure shouldn't red-X the PR the way
# an actual broken build should. Same reasoning as the non-fatal Slack notify
# steps in preview.yml.

on:
  workflow_run:
    workflows: ["Dependabot PR triage"]
    types: [completed]

permissions:
  actions: read
  issues: write

jobs:
  post:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      issues: write

    steps:
      # Non-Dependabot PRs skip the upstream job entirely (no artifact was ever
      # uploaded), and we're not relying on workflow_run.conclusion being exactly
      # 'success' vs. 'skipped' for that case being unverified — continue-on-error
      # here plus the file-existence check below makes this a clean no-op either way.
      - name: Download triage result
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dependabot-triage-result
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # ready to merge / status: needs-review already exist as labels used by
      # the project's manual triage workflow — reused here rather than adding
      # a parallel bot-only label scheme.
      - name: Post verdict comment and label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('triage-result.json')) {
              core.info('No triage-result.json (upstream job was skipped or produced nothing) — nothing to post.');
              return;
            }
            const result = JSON.parse(fs.readFileSync('triage-result.json', 'utf8'));
            const marker = '<!-- dependabot-triage:verdict -->';
            const isSafe = result.verdict === 'safe';

            const runbookUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/docs/runbooks/validating-dependency-updates.md`;

            const body = [
              '### 🤖 Dependency update triage',
              '',
              `**Verdict:** ${isSafe ? '✅ Safe to merge' : '⚠️ Needs review'}`,
              `**Package(s):** \`${result.dependencyNames}\``,
              `**Bump:** ${result.updateType} (${result.dependencyType})`,
              `**Why:** ${result.reason}`,
              '',
              `_Per the [decision matrix](${runbookUrl})._`,
              '',
              marker,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: result.prNumber,
                per_page: 100,
              });
              const existing = comments.find((c) => c.body && c.body.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: result.prNumber,
                  body,
                });
              }
            } catch (err) {
              core.warning(`Could not post triage comment on PR #${result.prNumber}: ${err.message}`);
            }

            const addLabel = isSafe ? 'ready to merge' : 'status: needs-review';
            const removeLabel = isSafe ? 'status: needs-review' : 'ready to merge';

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: result.prNumber,
                labels: [addLabel],
              });
            } catch (err) {
              core.warning(`Could not add label "${addLabel}" on PR #${result.prNumber}: ${err.message}`);
            }

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: result.prNumber,
                name: removeLabel,
              });
            } catch (err) {
              if (err.status !== 404) {
                core.warning(`Could not remove label "${removeLabel}" on PR #${result.prNumber}: ${err.message}`);
              }
            }
