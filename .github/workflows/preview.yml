name: PR Preview Vercel Deploy with Supabase preview DB

# PR preview deploy. Split into three jobs so untrusted fork code can never share
# a job with a secret.
#
# INVARIANT: every `secrets.*` reference lives in preview-deploy, which is gated off
# for forks by a single job-level `if:`. Keep verify and security-scan secret-free
# (they run fork code), and don't move a secret-bearing step — or a `run:` of a repo
# script — out of preview-deploy.

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  HUSKY: 0

permissions:
  contents: read

jobs:
  # Secret-free checks; runs for every PR, forks included, so fork code is safe here.
  # The migrations output is consumed by preview-deploy.
  # Required check: the branch-protection ruleset must point at this job. If you
  # rename it, update the ruleset — preview-deploy never runs for forks, so the
  # required check must be one that always runs.
  verify:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      migrations: ${{ steps.changes.outputs.migrations }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      - name: Check migration filename collisions
        run: bash scripts/ci/check-migration-collisions.sh

      - name: Detect migration changes
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**/*.sql'

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      # Production build with placeholder, non-secret env. Catches build-time breaks
      # (RSC serialization, route module-eval) that lint/tsc/tests miss — with no
      # deploy secret, so it runs on Dependabot and fork PRs too. The values are dummy
      # stand-ins; the real preview build runs in preview-deploy with branch DB env.
      # SUPABASE_SERVICE_ROLE_KEY is set because a route constructs an admin client at
      # module load, and page-data collection fails on an empty value.
      - name: Production build (placeholder env)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
        run: npm run build

  # Its own job, not folded into verify, so it runs in parallel with a tighter
  # permission set and separate timeout.
  security-scan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      # Using the gitleaks binary rather than gitleaks/gitleaks-action because the
      # wrapper requires GITLEAKS_LICENSE for organization repos. Revisit if/when
      # a license is approved — the swap is one step + the secret.
      #
      # Manual update: bump GITLEAKS_VERSION, then fetch the new SHA256 from
      # https://github.com/gitleaks/gitleaks/releases/download/v<VERSION>/gitleaks_<VERSION>_checksums.txt
      # and replace GITLEAKS_SHA256. Dependabot does not watch free-form version
      # strings in run blocks, so this is a manual ritual.
      - name: Secrets scan (gitleaks)
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version
          /tmp/gitleaks detect --no-banner --redact --log-opts "${BASE_SHA}..HEAD"

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Hidden character scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # --diff-filter=d excludes deleted paths (nothing at HEAD to scan)
          mapfile -d '' -t files < <(git diff -z --name-only --diff-filter=d "$BASE_SHA"..HEAD \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs' '*.cjs')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed source files to scan."
            exit 0
          fi
          node scripts/scan-hidden-chars.mjs "${files[@]}"

      - name: Audit dependencies
        run: npm ci --ignore-scripts && npm audit --audit-level=high

  # Every secret-bearing step lives here. The job-level `if:` below is the gate;
  # `needs: verify` makes the deploy wait on green checks and exposes the migrations
  # paths-filter result. Skipped for forks (can't reach secrets) AND for Dependabot
  # (GitHub withholds secrets from Dependabot runs, so a deploy attempt only ever
  # fails at `vercel pull` — skipping avoids a spurious red check on dependency PRs).
  preview-deploy:
    needs: verify
    if: >-
      github.event.action != 'closed' &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Setup Supabase CLI
        if: needs.verify.outputs.migrations == 'true'
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520  # v3.0.0
        with:
          version: "2.92.1"

      - name: Link to Preview project
        if: needs.verify.outputs.migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.PREVIEW_SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.PREVIEW_SUPABASE_PROJECT_ID }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push Supabase migrations to PREVIEW DB
        if: needs.verify.outputs.migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.PREVIEW_SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

      - name: Install Vercel CLI
        run: npm install -g vercel@54.2.0

      - name: Pull Vercel env
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview

      # WHY ENV IS NEEDED HERE
      # - Next.js injects NEXT_PUBLIC_* variables at build time
      # - The build output must point to the correct Supabase branch
      - name: Build app (using branch DB env)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PREVIEW_SUPABASE_PUB_KEY }}
        run: vercel build

      # WHY ENV IS NEEDED HERE:
      # - Vercel attaches runtime env vars to serverless/edge functions
      # - These are NOT baked into the build output
      - name: Deploy preview
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PREVIEW_SUPABASE_PUB_KEY }}
        run: bash scripts/ci/vercel-deploy-with-retry.sh preview_url --prebuilt

      - name: Comment PR with URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL || '';
            if (!url) {
              core.warning('preview_url is empty — skipping PR comment');
              return;
            }
            if (!/^https:\/\/[a-z0-9.-]+\.vercel\.app\b/.test(url)) {
              core.setFailed(`Unexpected preview URL: ${url}`);
              return;
            }
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployed: ${url}`,
            });

      - name: Slack notify success
        if: success()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        # Non-fatal: a Slack hiccup must never flip a good deploy to failed.
        # jq builds the JSON so values are escaped regardless of content.
        run: |
          payload="$(jq -cn --arg text "✅ <${PR_URL}|PR #${PR_NUMBER}> preview deployed: ${PREVIEW_URL}" '{text: $text}')"
          curl -sS -X POST -H 'Content-type: application/json' \
            --max-time 10 --retry 2 --retry-delay 2 \
            --data "$payload" "$SLACK_WEBHOOK_URL" || true

      - name: Slack notify failure
        if: failure()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        # Non-fatal: never let a Slack hiccup drop the failure alert silently.
        # jq builds the JSON so values are escaped regardless of content.
        run: |
          payload="$(jq -cn --arg text "❌ <${PR_URL}|PR #${PR_NUMBER}> preview failed." '{text: $text}')"
          curl -sS -X POST -H 'Content-type: application/json' \
            --max-time 10 --retry 2 --retry-delay 2 \
            --data "$payload" "$SLACK_WEBHOOK_URL" || true
