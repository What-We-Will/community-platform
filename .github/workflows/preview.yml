name: PR Preview Vercel Deploy with Supabase preview DB

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  HUSKY: 0

permissions:
  contents: read

jobs:
  pr-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.PREVIEW_SUPABASE_ACCESS_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Check migration filename collisions
        run: bash scripts/ci/check-migration-collisions.sh

      - name: Detect migration changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**/*.sql'

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Setup Supabase CLI
        if: steps.changes.outputs.migrations == 'true'
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51  # v1.6.0
        with:
          version: "2.92.1"

      - name: Link to Preview project
        if: steps.changes.outputs.migrations == 'true'
        run: supabase link --project-ref ${{ secrets.PREVIEW_SUPABASE_PROJECT_ID }}

      - name: Push Supabase migrations to PREVIEW DB
        if: steps.changes.outputs.migrations == 'true'
        run: supabase db push

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # WHY ENV IS NEEDED HERE
      # - Next.js injects NEXT_PUBLIC_* variables at build time
      # - The build output must point to the correct Supabase branch
      - name: Build app (using branch DB env)
        env:
          SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PREVIEW_SUPABASE_PUB_KEY }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # WHY ENV IS NEEDED HERE:
      # - Vercel attaches runtime env vars to serverless/edge functions
      # - These are NOT baked into the build output
      - name: Deploy preview
        id: deploy
        env:
          SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PREVIEW_SUPABASE_URL_BASE }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PREVIEW_SUPABASE_PUB_KEY }}
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> $GITHUB_OUTPUT

      - name: Comment PR with URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL || '';
            if (!url) {
              core.warning('preview_url is empty — skipping PR comment');
              return;
            }
            if (!/^https:\/\/[a-z0-9.-]+\.vercel\.app\b/.test(url)) {
              core.setFailed(`Unexpected preview URL: ${url}`);
              return;
            }
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployed: ${url}`,
            });

      - name: Slack notify success
        if: success()
        env:
          PR_NUMBER: ${{ github.event.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"PR #${PR_NUMBER} preview deployed: ${PREVIEW_URL}\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Slack notify failure
        if: failure()
        env:
          PR_NUMBER: ${{ github.event.number }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ PR #${PR_NUMBER} preview failed.\"}" \
            "$SLACK_WEBHOOK_URL"

  security-scan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      # Using the gitleaks binary rather than gitleaks/gitleaks-action because the
      # wrapper requires GITLEAKS_LICENSE for organization repos. Revisit if/when
      # a license is approved — the swap is one step + the secret.
      #
      # Manual update: bump GITLEAKS_VERSION, then fetch the new SHA256 from
      # https://github.com/gitleaks/gitleaks/releases/download/v<VERSION>/gitleaks_<VERSION>_checksums.txt
      # and replace GITLEAKS_SHA256. Dependabot does not watch free-form version
      # strings in run blocks, so this is a manual ritual.
      - name: Secrets scan (gitleaks)
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version
          /tmp/gitleaks detect --no-banner --redact --log-opts "${BASE_SHA}..HEAD"

      - name: Hidden character scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mapfile -d '' -t files < <(git diff -z --name-only "$BASE_SHA"..HEAD \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs' '*.cjs')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed source files to scan."
            exit 0
          fi
          node scripts/scan-hidden-chars.mjs "${files[@]}"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Audit dependencies
        run: npm ci --ignore-scripts && npm audit --audit-level=high
